name: Check Windows
description: Cargo check for Windows

inputs:
  release_branch:
    description: 'Release branch to check'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout release branch
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.release_branch }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: crates/gpui-unofficial

    - name: Check gpui-unofficial
      shell: pwsh
      run: |
        cd crates/gpui-unofficial
        cargo check

    - name: Check gpui-windows
      shell: pwsh
      run: |
        cd crates/gpui-windows-gpui-unofficial
        cargo check
