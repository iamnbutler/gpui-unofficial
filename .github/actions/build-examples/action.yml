name: Build Examples
description: Full build and compile examples

inputs:
  release_branch:
    description: 'Release branch to build'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout release branch
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.release_branch }}

    - name: Install system deps (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-x11-dev \
          libx11-xcb-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libvulkan-dev \
          libssl-dev \
          pkg-config \
          clang

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: crates/gpui-unofficial

    - name: Build examples
      shell: bash
      run: |
        cd crates/gpui-unofficial
        cargo build --examples
