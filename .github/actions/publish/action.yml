name: Publish Release
description: Publish to crates.io and create GitHub release

inputs:
  release_branch:
    description: 'Release branch to publish'
    required: true
  version:
    description: 'Version number (X.Y.Z)'
    required: true
  zed_tag:
    description: 'Zed release tag'
    required: true
  cargo_token:
    description: 'Crates.io API token'
    required: true
  github_token:
    description: 'GitHub token for releases'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout release branch
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.release_branch }}

    - name: Checkout xtask from main
      shell: bash
      run: |
        git fetch origin main
        git checkout origin/main -- xtask Cargo.toml

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache
      uses: Swatinem/rust-cache@v2

    - name: Publish to crates.io
      shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.cargo_token }}
      run: cargo run -p xtask --release -- publish --crates-dir crates

    - name: Create GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        gh release create "v${{ inputs.version }}" \
          --target "${{ inputs.release_branch }}" \
          --title "gpui-unofficial ${{ inputs.version }}" \
          --notes "Unofficial release of gpui, tracking zed ${{ inputs.zed_tag }}.

        ## Usage

        \`\`\`toml
        [dependencies]
        gpui-unofficial = \"${{ inputs.version }}\"
        \`\`\`

        See [zed ${{ inputs.zed_tag }} release notes](https://github.com/zed-industries/zed/releases/tag/${{ inputs.zed_tag }})."

    - name: Update generated branch
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -B generated
        git push origin generated --force
