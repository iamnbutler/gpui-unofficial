name: Transform Crates
description: Clone zed and transform crates for publishing

inputs:
  zed_tag:
    description: 'Zed release tag (e.g., v0.231.2)'
    required: true

outputs:
  release_branch:
    description: 'The orphan branch name (release/X.Y.Z)'
    value: ${{ steps.create-branch.outputs.branch }}
  version:
    description: 'The version number (X.Y.Z)'
    value: ${{ steps.create-branch.outputs.version }}

runs:
  using: composite
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Clone zed
      shell: bash
      run: |
        git clone --depth=1 --branch ${{ inputs.zed_tag }} \
          https://github.com/zed-industries/zed.git /tmp/zed

    - name: Build xtask
      shell: bash
      run: cargo build -p xtask --release

    - name: Transform crates
      shell: bash
      run: |
        cargo run -p xtask --release -- transform \
          --zed-tag ${{ inputs.zed_tag }} \
          --zed-path /tmp/zed

    - name: Create orphan branch
      id: create-branch
      shell: bash
      run: |
        VERSION="${{ inputs.zed_tag }}"
        VERSION="${VERSION#v}"
        BRANCH="release/${VERSION}"

        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Save crates to temp location
        cp -r crates /tmp/transformed-crates

        # Create orphan branch with just crates/
        git checkout --orphan "$BRANCH"
        git rm -rf . || true
        cp -r /tmp/transformed-crates crates
        git add crates/
        git commit -m "Release ${VERSION} from zed ${{ inputs.zed_tag }}"
        git push origin "$BRANCH" --force

        # Return to main so post-action cleanup can find .github/actions
        git checkout main

        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
