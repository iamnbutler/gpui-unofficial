name: Release

on:
  push:
    branches: [main]
    paths:
      - 'crates/transform-metadata.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from metadata
        id: version
        run: |
          VERSION=$(jq -r '.zed_tag' crates/transform-metadata.json | sed 's/^v//')
          ZED_TAG=$(jq -r '.zed_tag' crates/transform-metadata.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "zed_tag=$ZED_TAG" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tarball
        if: steps.check_release.outputs.exists != 'true'
        run: |
          tar -czvf gpui-unofficial-${{ steps.version.outputs.version }}.tar.gz crates/

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "gpui-unofficial ${{ steps.version.outputs.version }}" \
            --notes "Unofficial release of gpui, tracking zed ${{ steps.version.outputs.zed_tag }}.

          ## Usage

          Add to your Cargo.toml:
          \`\`\`toml
          [dependencies]
          gpui-unofficial = { git = \"https://github.com/gpui-unofficial/gpui-unofficial\", tag = \"v${{ steps.version.outputs.version }}\" }
          \`\`\`

          Or download the crates tarball below.

          ## Changes

          See [zed ${{ steps.version.outputs.zed_tag }} release notes](https://github.com/zed-industries/zed/releases/tag/${{ steps.version.outputs.zed_tag }}) for changes." \
            gpui-unofficial-${{ steps.version.outputs.version }}.tar.gz
