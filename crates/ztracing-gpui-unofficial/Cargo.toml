[package]
name = "ztracing-gpui-unofficial"
version = "0.231.2"
edition = "2024"
license = "GPL-3.0-or-later"
repository = "https://github.com/iamnbutler/gpui-unofficial"
description = "Unofficial release of Zed's ztracing crate"

[features]
tracy = ["tracing-tracy", "tracy-client"]

[dependencies]
zlog = { package = "zlog-gpui-unofficial", version = "0.231.2" }
tracing = { version = "0.1.40" }

tracing-subscriber = "0.3.22"
tracing-tracy = { version = "0.11.4", optional = true, features = ["enable", "ondemand"] }
tracy-client = { version = "0.18.2", optional = true, features = ["enable", "ondemand"] }
ztracing_macro = { package = "ztracing-macro-gpui-unofficial", version = "0.231.2" }

[workspace]
