[package]
name = "util-gpui-unofficial"
version = "1.9.0"
edition = "2024"
license = "Apache-2.0"
description = "A collection of utility structs and functions used by Zed and GPUI"
repository = "https://github.com/iamnbutler/gpui-unofficial"

[lib]
path = "src/util.rs"
doctest = true

[features]
test-support = ["rand", "util_macros"]

[dependencies]
anyhow = { version = "1.0.86" }
async_zip = { version = "0.0.18", features = ["deflate", "deflate64"] }
collections = { package = "collections-gpui-unofficial", version = "1.9.0" }
dunce = { version = "1.0" }
futures-lite = { version = "1.13" }
futures = { version = "0.3.32" }
globset = { version = "0.4" }
itertools = { version = "0.14.0" }
log = { version = "0.4.16", features = ["kv_unstable_serde", "serde"] }
rand = { version = "0.9", optional = true }
regex = { version = "1.5" }
rust-embed = { version = "8.11", features = ["include-exclude"] }
schemars = { version = "1.0", features = ["indexmap2"] }
serde = { version = "1.0.221", features = ["derive", "rc"] }
serde_json = { version = "1.0.144", features = ["preserve_order", "raw_value"] }
serde_json_lenient = { version = "0.2", features = [
    "preserve_order",
    "raw_value"] }
shlex = { version = "1.3.0" }
take-until = { version = "0.2.0" }
tempfile = { version = "3.20.0" }
unicase = { version = "2.6" }
url = { version = "2.2" }
percent-encoding = { version = "2.3.2" }
util_macros = { package = "util-macros-gpui-unofficial", version = "1.9.0", optional = true }
gpui_util = { package = "gpui-util-gpui-unofficial", version = "1.9.0" }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
smol = { version = "2.0" }
which = { version = "6.0.0" }
async-fs = { version = "2.1" }
walkdir = { version = "2.5" }
dirs = { version = "6.0" }

[target.'cfg(unix)'.dependencies]
command-fds = "0.3.1"
libc = { version = "0.2" }
nix = { version = "0.29", features = ["user"] }

[target.'cfg(target_os = "macos")'.dependencies]
mach2 = { version = "0.5" }

[target.'cfg(windows)'.dependencies]
tendril = "0.4.3"
windows = { version = "0.61", features = [
    "Foundation_Numerics",
    "Globalization_DateTimeFormatting",
    "Storage_Search",
    "Storage_Streams",
    "System_Threading",
    "UI_ViewManagement",
    "Wdk_System_SystemServices",
    "Win32_Foundation",
    "Win32_Globalization",
    "Win32_Graphics_Direct3D",
    "Win32_Graphics_Direct3D11",
    "Win32_Graphics_Direct3D_Fxc",
    "Win32_Graphics_DirectComposition",
    "Win32_Graphics_DirectWrite",
    "Win32_Graphics_DirectManipulation",
    "Win32_Graphics_Dwm",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Graphics_Gdi",
    "Win32_Graphics_Imaging",
    "Win32_Graphics_Hlsl",
    "Win32_Networking_WinSock",
    "Win32_Security",
    "Win32_Security_Credentials",
    "Win32_Security_Cryptography",
    "Win32_Storage_FileSystem",
    "Win32_System_Com",
    "Win32_System_Com_StructuredStorage",
    "Win32_System_Console",
    "Win32_System_Diagnostics_Debug",
    "Win32_System_DataExchange",
    "Win32_System_IO",
    "Win32_System_JobObjects",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_Ole",
    "Win32_System_Performance",
    "Win32_System_Pipes",
    "Win32_System_RestartManager",
    "Win32_System_SystemInformation",
    "Win32_System_SystemServices",
    "Win32_System_Threading",
    "Win32_System_Variant",
    "Win32_System_WinRT",
    "Win32_UI_Controls",
    "Win32_UI_HiDpi",
    "Win32_UI_Input_Ime",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Input_Pointer",
    "Win32_UI_Shell",
    "Win32_UI_Shell_Common",
    "Win32_UI_Shell_PropertiesSystem",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Media"] }

[dev-dependencies]
rand = { version = "0.9" }
util_macros = { package = "util-macros-gpui-unofficial", version = "1.9.0" }
pretty_assertions = { version = "1.3.0", features = ["unstable"] }

[workspace]
