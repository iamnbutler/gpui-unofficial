[package]
name = "util-macros-gpui-unofficial"
version = "0.233.7"
edition = "2024"
license = "Apache-2.0"
description = "Utility macros for Zed"
repository = "https://github.com/iamnbutler/gpui-unofficial"

[lib]
path = "src/util_macros.rs"
proc-macro = true
doctest = false

[dependencies]
quote = { version = "1.0.9" }
syn = { version = "2.0.101", features = ["full", "extra-traits", "visit-mut"] }
perf = { package = "perf-gpui-unofficial", version = "0.233.7" }

[features]
perf-enabled = []

[lints]
rust = { unexpected_cfgs = { level = "warn", check-cfg = ["cfg(perf_enabled)"] } }

[workspace]
